title: Meshtastic Apple App Documentation
description: "User and developer documentation for the Meshtastic iOS, iPadOS, and macOS app."

# just-the-docs theme (v0.11+)
remote_theme: just-the-docs/just-the-docs@v0.11.0

# Plugins required for remote_theme and redirects
plugins:
  - jekyll-remote-theme
  - jekyll-redirect-from

# Version selector support (just-the-docs v0.11+)
# Versions list is maintained in _data/versions.yml

# Navigation
nav_enabled: true
search_enabled: true
search_tokenizer_separator: /[\s\-/]+/

# Footer
footer_content: "Copyright &copy; 2024 Garth Vander Houwen. Distributed under the <a href=\"https://www.gnu.org/licenses/gpl-3.0.html\">GPL v3 License.</a>"

# Heading anchors
heading_anchors: true

# Collections for nav ordering
collections:
  user:
    output: true
    permalink: /user/:name/
  developer:
    output: true
    permalink: /developer/:name/

defaults:
  - scope:
      path: "user"
    values:
      parent: User Guide
      layout: default
  - scope:
      path: "developer"
    values:
      parent: Developer Guide
      layout: default

# Callouts (just-the-docs v0.11+)
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

# Color scheme
color_scheme: nil
