name: Build IPA
on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Project
        run: |
          xcodebuild build -scheme Meshtastic -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Create IPA (Fake Root)
        run: |
          mkdir -p payload/Payload
          mv build/Release-iphoneos/Meshtastic.app payload/Payload/
          cd payload && zip -r ../Meshtastic.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Meshtastic-IPA
          path: Meshtastic.ipa
