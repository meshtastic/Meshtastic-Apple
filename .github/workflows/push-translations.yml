nlname: Push Doc Translations to Docs Site

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language code (e.g., fr, es, de, ja)'
        required: true
        type: string
      version:
        description: 'App version (e.g., 2.7.13)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  push-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Meshtastic-Apple
        uses: actions/checkout@v4

      - name: Check if translations exist locally
        id: check-local
        run: |
          LANG="${{ inputs.language }}"
          VERSION="${{ inputs.version }}"
          TRANS_DIR="translations/${LANG}/${VERSION}"

          if [ ! -d "$TRANS_DIR" ]; then
            echo "No local translations found at $TRANS_DIR"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_COUNT=$(find "$TRANS_DIR" -name "*.md" | wc -l | tr -d ' ')
          echo "Found $FILE_COUNT translated markdown files"
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Check if translations already exist on docs site
        if: steps.check-local.outputs.available == 'true'
        id: check-remote
        run: |
          LANG="${{ inputs.language }}"
          VERSION="${{ inputs.version }}"
          REMOTE_PATH="docs/i18n/${LANG}/${VERSION}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/meshtastic/meshtastic/contents/${REMOTE_PATH}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Translations already exist at ${REMOTE_PATH} — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No translations found at ${REMOTE_PATH} — will create PR"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.check-local.outputs.available == 'true' && steps.check-remote.outputs.exists == 'false'
        id: check-pr
        run: |
          LANG="${{ inputs.language }}"
          VERSION="${{ inputs.version }}"
          BRANCH="translations/${LANG}/${VERSION}"

          PR_COUNT=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/meshtastic/meshtastic/pulls?head=meshtastic:${BRANCH}&state=open" \
            | jq '. | length')

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR already exists for branch ${BRANCH} — skipping"
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing PR — will create one"
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR on docs site
        if: >
          steps.check-local.outputs.available == 'true' &&
          steps.check-remote.outputs.exists == 'false' &&
          steps.check-pr.outputs.pr_exists == 'false'
        env:
          DOCS_SITE_TOKEN: ${{ secrets.DOCS_SITE_TOKEN }}
        run: |
          LANG="${{ inputs.language }}"
          VERSION="${{ inputs.version }}"
          BRANCH="translations/${LANG}/${VERSION}"
          TRANS_DIR="translations/${LANG}/${VERSION}"
          LANG_NAME=$(python3 -c "import locale; print(locale.normalize('${LANG}').split('.')[0].replace('_','-'))" 2>/dev/null || echo "$LANG")

          # Clone docs site repo
          git clone --depth 1 "https://x-access-token:${DOCS_SITE_TOKEN}@github.com/meshtastic/meshtastic.git" /tmp/docs-site
          cd /tmp/docs-site

          # Create branch
          git checkout -b "$BRANCH"

          # Copy translated files
          TARGET_DIR="docs/i18n/${LANG}/${VERSION}"
          mkdir -p "$TARGET_DIR"

          cd "$GITHUB_WORKSPACE"
          for section in user developer; do
            if [ -d "${TRANS_DIR}/${section}" ]; then
              mkdir -p "/tmp/docs-site/${TARGET_DIR}/${section}"
              cp "${TRANS_DIR}/${section}"/*.md "/tmp/docs-site/${TARGET_DIR}/${section}/" 2>/dev/null || true
            fi
          done

          # Commit and push
          cd /tmp/docs-site
          git config user.name "meshtastic-bot"
          git config user.email "bot@meshtastic.org"
          git add .
          git commit -m "Add ${LANG} translations for v${VERSION}

          Auto-generated machine translations from Meshtastic Apple app.
          Source: Apple Translation framework (on-device)
          
          These translations may need review by native speakers."

          git push origin "$BRANCH"

          # Create PR
          curl -s -X POST \
            -H "Authorization: Bearer ${DOCS_SITE_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/meshtastic/meshtastic/pulls" \
            -d @- << EOF
          {
            "title": "[${LANG^^}] Add translations for v${VERSION}",
            "body": "Auto-generated machine translations for Meshtastic Apple app v${VERSION}.\n\n**Language**: ${LANG}\n**Files**: ${{ steps.check-local.outputs.file_count }}\n**Source**: Apple Translation framework (on-device)\n\n> ⚠️ These translations were generated automatically and may need review by native speakers.",
            "head": "${BRANCH}",
            "base": "main"
          }
          EOF

          echo "✅ PR created for ${LANG} v${VERSION}"
